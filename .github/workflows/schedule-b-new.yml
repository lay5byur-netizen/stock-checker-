name: Stock Checker - B Grade

on:
  schedule:
    # 매일 07:00 KST (22:00 UTC 전날)
    - cron: '10 22 * * *'   # KST 07:10 (A와 충돌 방지)
  workflow_dispatch:

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Playwright Chromium
      run: |
        python -m playwright install chromium
    
    - name: Determine slot label
      id: slot
      run: |
        if [ "$(date -u +%H)" = "22" ]; then
          echo "label=morning-B" >> "$GITHUB_OUTPUT"
        else
          echo "label=evening-B" >> "$GITHUB_OUTPUT"
        fi
    
    - name: Run stock check (Grade B)
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        SLOT_NAME: ${{ steps.slot.outputs.label }}
        SMTP_HOST: ${{ secrets.SMTP_HOST }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASS: ${{ secrets.SMTP_PASS }}
        ALERT_TO: ${{ secrets.ALERT_TO }}
      run: python stock_checker.py --grades B --slot "$SLOT_NAME"
