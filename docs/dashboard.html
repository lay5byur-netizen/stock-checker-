<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 재고 모니터링 대시보드</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #2d3748;
        }

        .last-update {
            color: #718096;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .stat-card.urgent {
            border-left: 5px solid #f56565;
        }

        .stat-card.restock {
            border-left: 5px solid #48bb78;
        }

        .stat-card.warning {
            border-left: 5px solid #ed8936;
        }

        .stat-card.normal {
            border-left: 5px solid #4299e1;
        }

        .stat-label {
            font-size: 14px;
            color: #718096;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-size: 48px;
            font-weight: bold;
            color: #2d3748;
        }

        .controls {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 15px;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            border: none;
            background: #f7fafc;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .tab:hover {
            background: #667eea;
            color: white;
        }

        .items-container {
            display: grid;
            gap: 15px;
        }

        .item-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }

        .item-card:hover {
            transform: translateX(5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }

        .item-card.urgent {
            border-left-color: #f56565;
        }

        .item-card.restock {
            border-left-color: #48bb78;
        }

        .item-card.warning {
            border-left-color: #ed8936;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .item-title {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .item-color {
            font-size: 14px;
            color: #718096;
        }

        .item-status {
            font-size: 14px;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 500;
            white-space: nowrap;
        }

        .item-status.urgent {
            background: #fed7d7;
            color: #c53030;
        }

        .item-status.restock {
            background: #c6f6d5;
            color: #276749;
        }

        .item-status.warning {
            background: #feebc8;
            color: #c05621;
        }

        .item-details {
            display: grid;
            gap: 8px;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e2e8f0;
        }

        .item-detail {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            gap: 10px;
        }

        .item-detail-label {
            color: #718096;
            flex-shrink: 0;
        }

        .item-detail-value {
            color: #2d3748;
            font-weight: 500;
            text-align: right;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 18px;
            color: #718096;
        }

        .error-box {
            background: #fed7d7;
            border: 1px solid #fc8181;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .error-title {
            font-weight: 600;
            color: #c53030;
            margin-bottom: 10px;
        }

        .error-text {
            color: #742a2a;
            font-size: 14px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .stat-value {
                font-size: 36px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-card {
                padding: 15px;
            }

            .controls {
                padding: 15px;
            }

            .item-card {
                padding: 15px;
            }

            .item-title {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 재고 모니터링 대시보드</h1>
            <div class="last-update" id="lastUpdate">데이터 로딩 중...</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card urgent" onclick="filterItems('urgent')">
                <div class="stat-label">🔴 긴급 처리 필요</div>
                <div class="stat-value" id="urgentCount">-</div>
            </div>
            <div class="stat-card restock" onclick="filterItems('restock')">
                <div class="stat-label">🟢 재입고 알림</div>
                <div class="stat-value" id="restockCount">-</div>
            </div>
            <div class="stat-card warning" onclick="filterItems('warning')">
                <div class="stat-label">⚠️ 재고 부족</div>
                <div class="stat-value" id="warningCount">-</div>
            </div>
            <div class="stat-card normal" onclick="filterItems('normal')">
                <div class="stat-label">✅ 정상 재고</div>
                <div class="stat-value" id="normalCount">-</div>
            </div>
        </div>

        <div class="controls">
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 상품명, 색상으로 검색...">
            <div class="tabs">
                <button class="tab active" onclick="filterItems('all')">전체</button>
                <button class="tab" onclick="filterItems('urgent')">🔴 긴급</button>
                <button class="tab" onclick="filterItems('restock')">🟢 재입고</button>
                <button class="tab" onclick="filterItems('oos')">🟣 계속 품절</button>
                <button class="tab" onclick="filterItems('warning')">⚠️ 부족</button>
                <button class="tab" onclick="filterItems('normal')">🔵 정상</button>
            </div>
        </div>

        <div id="itemsContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <div class="loading-text">구글 시트에서 데이터를 불러오는 중...</div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_ID = '1rGBFWaN3DVq41DtcVgc0aM5LVDTXNzpg5LmYeJGzpRc';
        const SHEET_NAME = '전체 현황';
        
        let allItems = [];
        let currentFilter = 'all';

        // 구글 시트에서 데이터 가져오기
        async function loadData() {
            try {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error('시트를 불러올 수 없습니다. 공개 설정을 확인해주세요.');
                }
                
                const text = await response.text();
                
                // JSON 추출 (google.visualization.Query.setResponse(...) 형태)
                const json = JSON.parse(text.substring(47).slice(0, -2));
                
                // 데이터 파싱
                const rows = json.table.rows;
                allItems = rows.slice(1).map(row => { // 헤더 제외
                    const cells = row.c || [];
                    return {
                        number: cells[0]?.v || '',
                        name: cells[1]?.v || '',
                        color: cells[2]?.v || '',
                        stock: cells[3]?.v || '',
                        price: cells[4]?.v || '',
                        storeName: cells[5]?.v || ''
                    };
                }).filter(item => item.name); // 빈 행 제외

                updateStats();
                renderItems();
                updateLastUpdate();
            } catch (error) {
                console.error('데이터 로딩 실패:', error);
                showError(error.message);
            }
        }

        // 오류 표시
        function showError(message) {
            document.getElementById('itemsContainer').innerHTML = `
                <div class="error-box">
                    <div class="error-title">⚠️ 데이터를 불러올 수 없습니다</div>
                    <div class="error-text">
                        ${message}<br><br>
                        <strong>해결 방법:</strong><br>
                        1. 구글 시트가 "링크가 있는 모든 사용자" 공개 설정되어 있는지 확인<br>
                        2. 페이지를 새로고침 (F5)<br>
                        3. 문제가 계속되면 구글 시트 URL을 확인해주세요
                    </div>
                </div>
            `;
        }

        // 통계 업데이트
        function updateStats() {
            const stats = {
                urgent: 0,
                restock: 0,
                warning: 0,
                normal: 0
            };

            allItems.forEach(item => {
                const status = getItemStatus(item.stock);
                stats[status]++;
            });

            document.getElementById('urgentCount').textContent = stats.urgent;
            document.getElementById('restockCount').textContent = stats.restock;
            document.getElementById('warningCount').textContent = stats.warning;
            document.getElementById('normalCount').textContent = stats.normal;
        }

        // 아이템 상태 판별
        function getItemStatus(stock) {
            // 새 표기 (2026-05-14~): 🔴 신규품절 / 🟢 재입고 / 🟣 계속품절 / ⚫ 첫등록 전OOS
            //                       / 🟤 첫등록 일부OOS / 🔵 정상 / ⚠️ 재고적음
            // 레거시: 🎉 재입고 / 🟠 계속품절 / ✅ 정상 — 하위 호환
            if (!stock) return 'normal';
            const stockStr = String(stock);
            if (stockStr.startsWith('⚫') || stockStr.startsWith('🔴')) return 'urgent';
            if (stockStr.startsWith('🟢') || stockStr.startsWith('🎉')) return 'restock';
            if (stockStr.startsWith('🟣') || stockStr.startsWith('🟠') || stockStr.startsWith('🟤')) return 'oos';
            if (stockStr.startsWith('⚠️')) return 'warning';
            return 'normal';
        }

        // 아이템 렌더링
        function renderItems() {
            const container = document.getElementById('itemsContainer');
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();

            let filtered = allItems.filter(item => {
                // 필터 적용
                if (currentFilter !== 'all') {
                    const status = getItemStatus(item.stock);
                    if (status !== currentFilter) return false;
                }

                // 검색어 적용
                if (searchTerm) {
                    const searchText = `${item.name} ${item.color} ${item.storeName}`.toLowerCase();
                    if (!searchText.includes(searchTerm)) return false;
                }

                return true;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎊</div>
                        <div class="empty-state-text">
                            ${searchTerm ? '검색 결과가 없습니다.' : '해당하는 항목이 없습니다.'}
                        </div>
                    </div>
                `;
                return;
            }

            const html = `
                <div class="items-container">
                    ${filtered.map(item => renderItemCard(item)).join('')}
                </div>
            `;

            container.innerHTML = html;
        }

        // 아이템 카드 렌더링
        function renderItemCard(item) {
            const status = getItemStatus(item.stock);
            const statusText = {
                urgent: '긴급',
                restock: '재입고',
                warning: '주의',
                normal: '정상'
            }[status];

            return `
                <div class="item-card ${status}">
                    <div class="item-header">
                        <div>
                            <div class="item-title">${escapeHtml(item.name)}</div>
                            ${item.color ? `<div class="item-color">${escapeHtml(item.color)}</div>` : ''}
                        </div>
                        <div class="item-status ${status}">${statusText}</div>
                    </div>
                    <div class="item-details">
                        ${item.stock ? `
                            <div class="item-detail">
                                <span class="item-detail-label">재고 변동</span>
                                <span class="item-detail-value">${escapeHtml(item.stock)}</span>
                            </div>
                        ` : ''}
                        ${item.price ? `
                            <div class="item-detail">
                                <span class="item-detail-label">가격 변동</span>
                                <span class="item-detail-value">${escapeHtml(item.price)}</span>
                            </div>
                        ` : ''}
                        ${item.storeName ? `
                            <div class="item-detail">
                                <span class="item-detail-label">스토어 상품명</span>
                                <span class="item-detail-value">${escapeHtml(item.storeName)}</span>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // HTML 이스케이프
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 필터 변경
        function filterItems(filter) {
            currentFilter = filter;
            
            // 탭 활성화
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            if (filter !== 'all') {
                const tabTexts = {
                    urgent: '🔴 긴급',
                    restock: '🟢 재입고',
                    oos: '🟣 계속 품절',
                    warning: '⚠️ 부족',
                    normal: '🔵 정상'
                };
                const targetTab = Array.from(document.querySelectorAll('.tab')).find(
                    tab => tab.textContent === tabTexts[filter]
                );
                if (targetTab) targetTab.classList.add('active');
            } else {
                document.querySelector('.tab').classList.add('active');
            }

            renderItems();
        }

        // 마지막 업데이트 시간
        function updateLastUpdate() {
            const now = new Date();
            const formatted = now.toLocaleString('ko-KR', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = `마지막 업데이트: ${formatted}`;
        }

        // 검색 이벤트
        document.getElementById('searchBox').addEventListener('input', renderItems);

        // 자동 새로고침 (5분마다)
        setInterval(loadData, 5 * 60 * 1000);

        // 초기 로딩
        loadData();
    </script>
</body>
</html>
